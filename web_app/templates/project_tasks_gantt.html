{% extends "base.html" %}
{% block title %}ガントチャート - 予定管理システム{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12">

    <div class="d-flex align-items-center justify-content-between mb-3">
      <h5 class="fw-bold mb-0">ガントチャート</h5>
      <div class="d-flex gap-2 align-items-center">
        <button class="btn btn-outline-secondary btn-sm" id="ganttPrev">◀ 前へ</button>
        <span class="fw-semibold" id="ganttRange" style="min-width:200px; text-align:center;"></span>
        <button class="btn btn-outline-secondary btn-sm" id="ganttNext">次へ ▶</button>
        <button class="btn btn-outline-dark btn-sm ms-2" id="toggleAll" title="全グループ開閉">全開閉</button>
        <a class="btn btn-success btn-sm ms-2" id="ganttExport">📥 Excel出力</a>
        <a class="btn btn-outline-primary btn-sm ms-2" href="{{ url_for('project_tasks_bp.task_list') }}">一覧に戻る</a>
      </div>
    </div>

    <div class="card shadow-sm">
      <div id="ganttWrapper" style="position: relative;">
        {# 単一スクロールコンテナ（横・縦スクロール） #}
        <div class="card-body p-2" id="ganttContainer" style="overflow: auto; max-height: 80vh; position: relative;">
          {# ヘッダー固定（コンテナ内sticky） #}
          <div id="ganttHeaderWrap" style="position: sticky; top: 0; z-index: 10; background: #fff;">
            <canvas id="ganttHeaderCanvas"></canvas>
          </div>
          <canvas id="ganttCanvas"></canvas>
          {# ── インライン編集用オーバーレイ（コンテナ内に配置） ── #}
          <div id="editOverlay" style="display:none; position:absolute; z-index:100;">
            <select id="editStatus" class="form-select form-select-sm" style="display:none; font-size:11px; padding:1px 4px; height:26px; width:70px;">
              {% for s in ['未着手','着手','順調','遅れ','完了','停止'] %}
              <option value="{{ s }}">{{ s }}</option>
              {% endfor %}
            </select>
            <input id="editNumber" type="number" class="form-control form-control-sm" style="display:none; font-size:11px; padding:1px 4px; height:26px; width:56px; text-align:center;" min="0">
          </div>
        </div>
      </div>
    </div>

    <div class="mt-2 small text-muted d-flex gap-4 flex-wrap">
      <span><span style="display:inline-block;width:14px;height:14px;background:linear-gradient(135deg,#93c5fd,#3b82f6);border-radius:3px;vertical-align:middle;"></span> 予定期間</span>
      <span><span style="display:inline-block;width:14px;height:14px;background:linear-gradient(135deg,#6ee7b7,#10b981);border-radius:3px;vertical-align:middle;"></span> 進捗（実績）</span>
      <span><span style="display:inline-block;width:14px;height:14px;background:linear-gradient(135deg,#fca5a5,#ef4444);border-radius:3px;vertical-align:middle;"></span> 遅延</span>
      <span><span style="display:inline-block;width:2px;height:14px;background:#7c3aed;vertical-align:middle;border-left:2px dashed #7c3aed;"></span> マイルストーン（縦線）</span>
      <span>｜<span style="color:#dc3545;">赤線</span> = 今日</span>
    </div>

  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
(function () {
  var tasks = {{ gantt_json | safe }};
  var DISPLAY_DAYS = 28;
  var PRIVILEGED = {{ 'true' if privileged else 'false' }};
  var CSRF_TOKEN = '{{ csrf_token }}';
  var UPDATE_URL_BASE = '{{ url_for("project_tasks_bp.gantt_update_dates", task_id=0) }}'.replace('/0', '/');
  var FIELDS_URL_BASE = '{{ url_for("project_tasks_bp.gantt_update_fields", task_id=0) }}'.replace('/0', '/');
  var REORDER_URL = '{{ url_for("project_tasks_bp.gantt_reorder") }}';
  var STATUSES = ['未着手','着手','順調','遅れ','完了','停止'];

  /* ステータス色 */
  var STATUS_COLORS = {
    '未着手': '#9ca3af', '着手': '#60a5fa', '順調': '#34d399',
    '遅れ': '#f87171', '完了': '#10b981', '停止': '#d1d5db'
  };

  /* ── 大区分 → 中区分 → タスク の3階層グループ化 ── */
  var categoryOrder = [];
  var categoryMap = {};   /* cat -> { subcatOrder: [], subcatMap: { subcat -> [tasks] } } */
  var milestoneOnlyTasks = [];
  tasks.forEach(function (t) {
    if (t.milestone_only) { milestoneOnlyTasks.push(t); return; }
    var cat = t.category || '（未分類）';
    var sub = t.subcategory || '（その他）';
    if (!categoryMap[cat]) {
      categoryMap[cat] = { subcatOrder: [], subcatMap: {} };
      categoryOrder.push(cat);
    }
    var cm = categoryMap[cat];
    if (!cm.subcatMap[sub]) { cm.subcatMap[sub] = []; cm.subcatOrder.push(sub); }
    cm.subcatMap[sub].push(t);
  });

  var collapsed = {};
  categoryOrder.forEach(function (c) { collapsed[c] = false; });

  var today = new Date();
  var dayOfWeek = today.getDay();
  var daysToThisMon = dayOfWeek === 0 ? 6 : (dayOfWeek - 1);
  var thisMonday = new Date(today);
  thisMonday.setDate(today.getDate() - daysToThisMon);
  var startDate = new Date(thisMonday);
  startDate.setDate(thisMonday.getDate() - 7);

  document.getElementById('ganttPrev').addEventListener('click', function () {
    startDate.setDate(startDate.getDate() - 7); drawGantt();
  });
  document.getElementById('ganttNext').addEventListener('click', function () {
    startDate.setDate(startDate.getDate() + 7); drawGantt();
  });
  document.getElementById('toggleAll').addEventListener('click', function () {
    var anyOpen = categoryOrder.some(function (c) { return !collapsed[c]; });
    categoryOrder.forEach(function (c) { collapsed[c] = anyOpen; });
    drawGantt();
  });

  /* Excel出力ボタン */
  document.getElementById('ganttExport').addEventListener('click', function () {
    var startStr = dateToStr(startDate);
    var url = '{{ url_for("project_tasks_bp.export_gantt") }}' +
      '?start=' + startStr + '&days=' + DISPLAY_DAYS;
    window.location.href = url;
  });

  var dpr = window.devicePixelRatio || 1;
  var canvas = document.getElementById('ganttCanvas');
  var headerCanvas = document.getElementById('ganttHeaderCanvas');
  var container = document.getElementById('ganttContainer');
  var headerWrap = document.getElementById('ganttHeaderWrap');
  var catClickAreas = [];
  var barAreas = [];
  var cellClickAreas = [];  /* 編集可能セル */
  var rowAreas = [];         /* 行ドラッグ用 */
  var dragState = null;
  var didDrag = false;
  var EDGE_PX = 8;

  /* ── 行ドラッグ（並び替え）── */
  var rowDrag = null;  /* { cat, fromIdx, task, startY } */

  /* ── 列幅定義 ── */
  var nameColW = 200, assignColW = 70;
  var statusColW = 56, delayColW = 48, progColW = 42;
  var extraColsW = statusColW + delayColW + progColW;

  function getRowAt(mx, my) {
    for (var i = 0; i < rowAreas.length; i++) {
      var r = rowAreas[i];
      if (my >= r.y && my < r.y + r.h && mx < r.handleX) return r;
    }
    return null;
  }

  function getBarAt(mx, my) {
    for (var i = 0; i < barAreas.length; i++) {
      var b = barAreas[i];
      if (my >= b.barY && my <= b.barY + b.barH && mx >= b.barX && mx <= b.barX + b.barW) {
        var onLeft = mx <= b.barX + EDGE_PX;
        var onRight = mx >= b.barX + b.barW - EDGE_PX;
        return { bar: b, edge: onLeft ? 'left' : (onRight ? 'right' : 'middle') };
      }
    }
    return null;
  }

  function getCellAt(mx, my) {
    for (var i = 0; i < cellClickAreas.length; i++) {
      var c = cellClickAreas[i];
      if (mx >= c.x && mx < c.x + c.w && my >= c.y && my < c.y + c.h) return c;
    }
    return null;
  }

  function dateToStr(d) {
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var dd = ('0' + d.getDate()).slice(-2);
    return y + '-' + m + '-' + dd;
  }

  function parseDate(s) {
    var parts = s.split('-');
    return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  }

  canvas.addEventListener('mousedown', function (e) {
    if (!PRIVILEGED) return;
    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;

    /* 行ドラッグ（左端エリア） */
    var rowHit = getRowAt(mx, my);
    if (rowHit) {
      e.preventDefault();
      rowDrag = { cat: rowHit.cat, sub: rowHit.sub, fromIdx: rowHit.idx, task: rowHit.task, startY: my, currentIdx: rowHit.idx };
      canvas.style.cursor = 'ns-resize';
      return;
    }

    var hit = getBarAt(mx, my);
    if (!hit) return;
    e.preventDefault();
    didDrag = false;
    dragState = {
      task: hit.bar.task, edge: hit.edge,
      origStart: hit.bar.task.start, origEnd: hit.bar.task.end,
      startX: mx, dayWidth: hit.bar.dayWidth
    };
    canvas.style.cursor = hit.edge === 'middle' ? 'grabbing' : 'col-resize';
  });

  canvas.addEventListener('mousemove', function (e) {
    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;

    /* 行ドラッグ中（中区分内で移動） */
    if (rowDrag) {
      var list = categoryMap[rowDrag.cat].subcatMap[rowDrag.sub];
      var bestIdx = rowDrag.currentIdx;
      for (var ri = 0; ri < rowAreas.length; ri++) {
        var ra = rowAreas[ri];
        if (ra.cat === rowDrag.cat && ra.sub === rowDrag.sub && my >= ra.y && my < ra.y + ra.h) {
          bestIdx = ra.idx; break;
        }
      }
      if (bestIdx !== rowDrag.currentIdx) {
        var fromI = list.indexOf(rowDrag.task);
        if (fromI >= 0) {
          list.splice(fromI, 1);
          list.splice(bestIdx, 0, rowDrag.task);
          rowDrag.currentIdx = bestIdx;
          drawGantt();
        }
      }
      canvas.style.cursor = 'ns-resize';
      return;
    }

    if (dragState) {
      var dx = mx - dragState.startX;
      var dayDelta = Math.round(dx / dragState.dayWidth);
      if (dayDelta !== 0) didDrag = true;
      var origS = parseDate(dragState.origStart);
      var origE = parseDate(dragState.origEnd);
      if (dragState.edge === 'left') {
        var newS = new Date(origS); newS.setDate(origS.getDate() + dayDelta);
        if (newS <= origE) { dragState.task.start = dateToStr(newS); dragState.task.end = dragState.origEnd; }
      } else if (dragState.edge === 'right') {
        var newE = new Date(origE); newE.setDate(origE.getDate() + dayDelta);
        if (newE >= origS) { dragState.task.end = dateToStr(newE); dragState.task.start = dragState.origStart; }
      } else {
        var newS2 = new Date(origS); newS2.setDate(origS.getDate() + dayDelta);
        var newE2 = new Date(origE); newE2.setDate(origE.getDate() + dayDelta);
        dragState.task.start = dateToStr(newS2); dragState.task.end = dateToStr(newE2);
      }
      drawGantt();
      return;
    }

    /* カーソル形状 */
    var hit = getBarAt(mx, my);
    if (hit && PRIVILEGED) {
      canvas.style.cursor = hit.edge === 'middle' ? 'grab' : 'col-resize';
      return;
    }
    var cell = PRIVILEGED ? getCellAt(mx, my) : null;
    if (cell) { canvas.style.cursor = 'pointer'; return; }
    var onCat = false;
    for (var i = 0; i < catClickAreas.length; i++) {
      var a = catClickAreas[i];
      if (my >= a.y && my < a.y + a.h && mx < a.maxX) { onCat = true; break; }
    }
    /* 行ドラッグハンドル領域のカーソル */
    var rowHit = PRIVILEGED ? getRowAt(mx, my) : null;
    if (rowHit) { canvas.style.cursor = 'ns-resize'; return; }
    canvas.style.cursor = onCat ? 'pointer' : 'default';
  });

  canvas.addEventListener('mouseup', function () {
    /* 行ドラッグ完了 → サーバーに保存 */
    if (rowDrag) {
      var list = categoryMap[rowDrag.cat].subcatMap[rowDrag.sub];
      var order = list.map(function (t) { return t.id; });
      rowDrag = null;
      canvas.style.cursor = 'default';
      fetch(REORDER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': CSRF_TOKEN },
        body: JSON.stringify({ order: order })
      }).catch(function () { alert('並び替えの保存に失敗しました'); });
      return;
    }
    if (!dragState) return;
    var task = dragState.task;
    var changed = (task.start !== dragState.origStart || task.end !== dragState.origEnd);
    var taskId = task.id;
    dragState = null;
    canvas.style.cursor = 'default';

    if (changed && didDrag) {
      var url = UPDATE_URL_BASE + taskId;
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': CSRF_TOKEN },
        body: JSON.stringify({ start_date: task.start, end_date: task.end })
      }).then(function (r) {
        if (!r.ok) {
          r.text().then(function (t) {
            try { var j = JSON.parse(t); alert('保存エラー: ' + (j.error || r.status)); }
            catch (e) { alert('保存に失敗しました（' + r.status + '）'); }
          });
          location.reload();
        }
      }).catch(function () { alert('通信エラー'); location.reload(); });
    }
    didDrag = false;
  });

  canvas.addEventListener('mouseleave', function () {
    if (rowDrag) { rowDrag = null; drawGantt(); }
    if (dragState) {
      dragState.task.start = dragState.origStart;
      dragState.task.end = dragState.origEnd;
      dragState = null;
      didDrag = false;
      drawGantt();
    }
  });

  /* ── インライン編集オーバーレイ ── */
  var overlay = document.getElementById('editOverlay');
  var editSelect = document.getElementById('editStatus');
  var editNumber = document.getElementById('editNumber');
  var activeEdit = null;

  function hideEditor() {
    overlay.style.display = 'none';
    editSelect.style.display = 'none';
    editNumber.style.display = 'none';
    activeEdit = null;
  }

  function showEditor(cell) {
    hideEditor();
    activeEdit = cell;

    /* オーバーレイはコンテナ内にあるため、canvas位置 + セル座標で配置 */
    var posX = canvas.offsetLeft + cell.x;
    var posY = canvas.offsetTop + cell.y;

    overlay.style.left = posX + 'px';
    overlay.style.top = posY + 'px';
    overlay.style.display = 'block';

    if (cell.field === 'status') {
      editSelect.value = cell.task.status;
      editSelect.style.display = 'block';
      editSelect.style.width = cell.w + 'px';
      editSelect.style.height = cell.h + 'px';
      editSelect.focus();
    } else {
      var val = cell.field === 'progress' ? cell.task.progress : (cell.task.delay_days || 0);
      editNumber.value = val;
      editNumber.style.display = 'block';
      editNumber.style.width = cell.w + 'px';
      editNumber.style.height = cell.h + 'px';
      if (cell.field === 'progress') {
        editNumber.max = 100;
      } else {
        editNumber.removeAttribute('max');
      }
      editNumber.focus();
      editNumber.select();
    }
  }

  function saveField(task, field, value) {
    var payload = {};
    payload[field] = value;
    fetch(FIELDS_URL_BASE + task.id, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': CSRF_TOKEN },
      body: JSON.stringify(payload)
    }).then(function (r) {
      if (!r.ok) { alert('保存に失敗しました'); return; }
      return r.json();
    }).then(function (data) {
      if (!data || !data.ok) return;
      task.status = data.status;
      task.progress = data.progress;
      task.delay_days = data.delay_days;
      drawGantt();
    }).catch(function () { alert('通信エラー'); });
  }

  editSelect.addEventListener('change', function () {
    if (!activeEdit) return;
    saveField(activeEdit.task, 'status', editSelect.value);
    hideEditor();
  });
  editSelect.addEventListener('blur', function () { setTimeout(hideEditor, 150); });

  editNumber.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (!activeEdit) return;
      var val = parseInt(editNumber.value) || 0;
      if (activeEdit.field === 'progress') val = Math.max(0, Math.min(val, 100));
      else val = Math.max(0, val);
      saveField(activeEdit.task, activeEdit.field, val);
      hideEditor();
    } else if (e.key === 'Escape') {
      hideEditor();
    }
  });
  editNumber.addEventListener('blur', function () {
    if (!activeEdit) return;
    var val = parseInt(editNumber.value) || 0;
    if (activeEdit.field === 'progress') val = Math.max(0, Math.min(val, 100));
    else val = Math.max(0, val);
    saveField(activeEdit.task, activeEdit.field, val);
    setTimeout(hideEditor, 50);
  });

  canvas.addEventListener('click', function (e) {
    if (didDrag) { didDrag = false; return; }
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;

    /* 編集セルクリック */
    if (PRIVILEGED) {
      var cell = getCellAt(x, y);
      if (cell) { showEditor(cell); return; }
    }

    /* カテゴリ開閉 */
    for (var i = 0; i < catClickAreas.length; i++) {
      var a = catClickAreas[i];
      if (y >= a.y && y < a.y + a.h && x < a.maxX) {
        collapsed[a.cat] = !collapsed[a.cat]; drawGantt(); return;
      }
    }

    hideEditor();
  });

  function fmtDate(d) { return (d.getMonth() + 1) + '/' + d.getDate(); }

  function barGradient(ctx, x, y, h, color1, color2) {
    var g = ctx.createLinearGradient(x, y, x, y + h);
    g.addColorStop(0, color1); g.addColorStop(1, color2);
    return g;
  }

  function drawGantt() {
    var ctx = canvas.getContext('2d');
    catClickAreas = [];
    barAreas = [];
    cellClickAreas = [];
    rowAreas = [];
    var msLabels = [];

    var endDate = new Date(startDate);
    endDate.setDate(startDate.getDate() + DISPLAY_DAYS - 1);
    document.getElementById('ganttRange').textContent =
      startDate.getFullYear() + '年 ' + fmtDate(startDate) + ' 〜 ' + fmtDate(endDate);

    var leftMargin = nameColW + assignColW + extraColsW;
    var rowHeight = 32, catRowHeight = 32, subcatRowHeight = 26;
    var baseHeaderHeight = 50;
    /* イベント行の高さ（マイルストーン数に応じて動的） */
    var eventRowHeight = 0;
    if (milestoneOnlyTasks.length > 0) eventRowHeight = Math.max(24, milestoneOnlyTasks.length * 18 + 8);
    var headerHeight = baseHeaderHeight + eventRowHeight;
    var containerWidth = canvas.parentElement.clientWidth - 20;
    var dayWidth = Math.max(22, Math.floor((containerWidth - leftMargin) / DISPLAY_DAYS));
    var totalWidth = leftMargin + DISPLAY_DAYS * dayWidth + 2;

    var totalRowHeight = 0;
    categoryOrder.forEach(function (cat) {
      totalRowHeight += catRowHeight;
      if (!collapsed[cat]) {
        var cm = categoryMap[cat];
        cm.subcatOrder.forEach(function (sub) {
          totalRowHeight += subcatRowHeight;
          totalRowHeight += cm.subcatMap[sub].length * rowHeight;
        });
      }
    });
    var totalHeight = headerHeight + totalRowHeight + 10;

    canvas.width = totalWidth * dpr;
    canvas.height = totalHeight * dpr;
    canvas.style.width = totalWidth + 'px';
    canvas.style.height = totalHeight + 'px';
    ctx.scale(dpr, dpr);

    /* 全体背景 */
    ctx.fillStyle = '#fafbfc';
    ctx.fillRect(0, 0, totalWidth, totalHeight);

    var WEEKDAY_JA = ['日', '月', '火', '水', '木', '金', '土'];

    /* ヘッダー背景 */
    var hdrGrad = ctx.createLinearGradient(0, 0, 0, baseHeaderHeight);
    hdrGrad.addColorStop(0, '#f8fafc'); hdrGrad.addColorStop(1, '#e2e8f0');
    ctx.fillStyle = hdrGrad;
    ctx.fillRect(0, 0, totalWidth, baseHeaderHeight);
    /* イベント行背景 */
    if (eventRowHeight > 0) {
      ctx.fillStyle = '#f5f3ff';
      ctx.fillRect(0, baseHeaderHeight, totalWidth, eventRowHeight);
    }

    /* 日付ヘッダー + グリッド */
    var prevMonth = -1;
    for (var di = 0; di < DISPLAY_DAYS; di++) {
      var dt = new Date(startDate);
      dt.setDate(startDate.getDate() + di);
      var x = leftMargin + di * dayWidth;
      var dow = dt.getDay();
      var dayNum = dt.getDate();
      var mon = dt.getMonth();

      if (dow === 0 || dow === 6) {
        ctx.fillStyle = dow === 0 ? 'rgba(239,68,68,0.05)' : 'rgba(59,130,246,0.05)';
        ctx.fillRect(x, headerHeight, dayWidth, totalHeight - headerHeight);
        ctx.fillStyle = dow === 0 ? 'rgba(239,68,68,0.08)' : 'rgba(59,130,246,0.08)';
        ctx.fillRect(x, 0, dayWidth, headerHeight);
      }

      if (mon !== prevMonth && prevMonth !== -1) {
        ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, totalHeight); ctx.stroke();
      }
      prevMonth = mon;

      ctx.fillStyle = dow === 0 ? '#ef4444' : dow === 6 ? '#3b82f6' : '#475569';
      ctx.textAlign = 'center';
      ctx.font = '10px "游ゴシック", "Yu Gothic", "メイリオ", sans-serif';
      if (dayNum === 1 || di === 0) {
        ctx.fillText((mon + 1) + '/' + dayNum, x + dayWidth / 2, 28);
      } else {
        ctx.fillText(String(dayNum), x + dayWidth / 2, 28);
      }
      ctx.font = '9px "游ゴシック", "Yu Gothic", sans-serif';
      ctx.fillText(WEEKDAY_JA[dow], x + dayWidth / 2, 42);

      ctx.strokeStyle = (dow === 1) ? '#d0d5dd' : '#ececec';
      ctx.lineWidth = (dow === 1) ? 0.8 : 0.4;
      ctx.beginPath(); ctx.moveTo(x, headerHeight); ctx.lineTo(x, totalHeight); ctx.stroke();
    }

    /* ヘッダー下線（日付行の下） */
    ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, baseHeaderHeight); ctx.lineTo(totalWidth, baseHeaderHeight); ctx.stroke();
    /* イベント行下線（全ヘッダーの下） */
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, headerHeight); ctx.lineTo(totalWidth, headerHeight); ctx.stroke();

    /* 今日の列ハイライト（日曜と同じ背景色方式 + 赤枠） */
    var todayOffset = Math.floor((today - startDate) / 86400000);
    var todayColX = -1;
    if (todayOffset >= 0 && todayOffset < DISPLAY_DAYS) {
      todayColX = leftMargin + todayOffset * dayWidth;
      /* ヘッダー部分: 薄い赤背景 */
      ctx.fillStyle = 'rgba(239,68,68,0.12)';
      ctx.fillRect(todayColX, 0, dayWidth, headerHeight);
      /* ボディ部分: 薄い赤背景 */
      ctx.fillStyle = 'rgba(239,68,68,0.06)';
      ctx.fillRect(todayColX, headerHeight, dayWidth, totalHeight - headerHeight);
    }

    var rangeStart = new Date(startDate); rangeStart.setHours(0, 0, 0, 0);
    var rangeEnd = new Date(endDate); rangeEnd.setHours(23, 59, 59, 999);

    /* 列見出しヘッダー背景 */
    ctx.fillStyle = hdrGrad;
    ctx.fillRect(0, 0, leftMargin, baseHeaderHeight);
    if (eventRowHeight > 0) {
      ctx.fillStyle = '#f5f3ff';
      ctx.fillRect(0, baseHeaderHeight, leftMargin, eventRowHeight);
    }

    /* 列見出し文字 */
    ctx.fillStyle = '#334155'; ctx.textAlign = 'center';
    ctx.font = 'bold 11px "游ゴシック", "Yu Gothic", sans-serif';
    ctx.fillText('項目名', nameColW / 2, 30);
    ctx.fillText('担当', nameColW + assignColW / 2, 30);
    var colBaseX = nameColW + assignColW;
    ctx.font = 'bold 9px "游ゴシック", "Yu Gothic", sans-serif';
    ctx.fillText('状態', colBaseX + statusColW / 2, 30);
    ctx.fillText('遅延', colBaseX + statusColW + delayColW / 2, 30);
    ctx.fillText('進捗', colBaseX + statusColW + delayColW + progColW / 2, 30);

    /* 列区切り罫線 */
    var colDividers = [nameColW, nameColW + assignColW,
                       colBaseX + statusColW,
                       colBaseX + statusColW + delayColW,
                       leftMargin];
    colDividers.forEach(function (cx) {
      ctx.strokeStyle = (cx === leftMargin) ? '#94a3b8' : '#cbd5e1';
      ctx.lineWidth = (cx === leftMargin) ? 1.5 : 1;
      ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, totalHeight); ctx.stroke();
    });

    /* ── カテゴリ別タスク描画 ── */
    var currentY = headerHeight;
    var catColors = ['#4f46e5', '#0891b2', '#059669', '#d97706', '#dc2626', '#7c3aed'];

    categoryOrder.forEach(function (cat, catIdx) {
      var cm = categoryMap[cat];
      var totalTaskCount = 0;
      cm.subcatOrder.forEach(function (s) { totalTaskCount += cm.subcatMap[s].length; });
      var isOpen = !collapsed[cat];
      var y = currentY;
      var accentColor = catColors[catIdx % catColors.length];

      /* カテゴリヘッダー行 */
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, y, totalWidth, catRowHeight);
      ctx.fillStyle = accentColor;
      ctx.fillRect(0, y, 4, catRowHeight);

      ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, y + catRowHeight); ctx.lineTo(totalWidth, y + catRowHeight); ctx.stroke();

      /* 開閉アイコン */
      var iconX = 14;
      var iconCY = y + catRowHeight / 2;
      ctx.fillStyle = accentColor;
      ctx.beginPath();
      if (isOpen) {
        ctx.moveTo(iconX, iconCY - 4); ctx.lineTo(iconX + 10, iconCY - 4); ctx.lineTo(iconX + 5, iconCY + 4);
      } else {
        ctx.moveTo(iconX, iconCY - 5); ctx.lineTo(iconX + 8, iconCY); ctx.lineTo(iconX, iconCY + 5);
      }
      ctx.closePath(); ctx.fill();

      ctx.font = 'bold 11px "游ゴシック", "Yu Gothic", sans-serif';
      ctx.fillStyle = '#1e293b'; ctx.textAlign = 'left';
      ctx.fillText(cat, iconX + 16, iconCY + 4);
      ctx.font = '9px sans-serif'; ctx.fillStyle = '#94a3b8';
      ctx.fillText('(' + totalTaskCount + ')', iconX + 18 + ctx.measureText(cat).width + 4, iconCY + 4);

      catClickAreas.push({ cat: cat, y: y, h: catRowHeight, maxX: leftMargin });
      currentY += catRowHeight;
      if (!isOpen) return;

      /* ── 中区分ループ ── */
      cm.subcatOrder.forEach(function (sub) {
        var taskList = cm.subcatMap[sub];
        var sy = currentY;
        var sMidY = sy + subcatRowHeight / 2;

        /* 中区分ヘッダー行 */
        ctx.fillStyle = '#f1f5f9';
        ctx.fillRect(0, sy, totalWidth, subcatRowHeight);
        ctx.fillStyle = accentColor + '40';
        ctx.fillRect(0, sy, 4, subcatRowHeight);
        ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(0, sy + subcatRowHeight); ctx.lineTo(totalWidth, sy + subcatRowHeight); ctx.stroke();

        ctx.font = 'bold 10px "游ゴシック", "Yu Gothic", sans-serif';
        ctx.fillStyle = '#475569'; ctx.textAlign = 'left';
        ctx.fillText('┗ ' + sub, 28, sMidY + 4);
        ctx.font = '9px sans-serif'; ctx.fillStyle = '#94a3b8';
        ctx.fillText('(' + taskList.length + ')', 34 + ctx.measureText('┗ ' + sub).width, sMidY + 4);

        /* 中区分の列区切り罫線 */
        colDividers.forEach(function (cx) {
          ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(cx, sy); ctx.lineTo(cx, sy + subcatRowHeight); ctx.stroke();
        });

        currentY += subcatRowHeight;

        /* ── 子タスク描画 ── */
        taskList.forEach(function (task, ti) {
        var ty = currentY;
        var midY = ty + rowHeight / 2;

        /* 行ドラッグ領域を登録（左端20px） */
        if (PRIVILEGED) {
          rowAreas.push({ cat: cat, sub: sub, idx: ti, task: task, y: ty, h: rowHeight, handleX: 20 });
        }

        /* ドラッグ中の行ハイライト */
        if (rowDrag && rowDrag.task === task) {
          ctx.fillStyle = '#eff6ff';
          ctx.fillRect(0, ty, totalWidth, rowHeight);
        } else {
          /* 交互背景 */
          ctx.fillStyle = (ti % 2 === 0) ? '#ffffff' : '#f8fafc';
          ctx.fillRect(0, ty, totalWidth, rowHeight);
        }

        /* 土日背景を再描画 */
        for (var wdi = 0; wdi < DISPLAY_DAYS; wdi++) {
          var wdt = new Date(startDate); wdt.setDate(startDate.getDate() + wdi);
          var wdow = wdt.getDay();
          if (wdow === 0 || wdow === 6) {
            ctx.fillStyle = wdow === 0 ? 'rgba(239,68,68,0.03)' : 'rgba(59,130,246,0.03)';
            ctx.fillRect(leftMargin + wdi * dayWidth, ty, dayWidth, rowHeight);
          }
        }

        /* 行区切り線 */
        ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(0, ty + rowHeight); ctx.lineTo(totalWidth, ty + rowHeight); ctx.stroke();

        /* 列区切り罫線 */
        colDividers.forEach(function (cx) {
          ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(cx, ty); ctx.lineTo(cx, ty + rowHeight); ctx.stroke();
        });

        /* 左アクセントライン */
        ctx.fillStyle = accentColor + '30';
        ctx.fillRect(0, ty, 4, rowHeight);

        /* ドラッグハンドル ≡（管理者のみ） */
        if (PRIVILEGED) {
          ctx.strokeStyle = '#b0b8c4'; ctx.lineWidth = 1;
          for (var hi = 0; hi < 3; hi++) {
            var hly = midY - 4 + hi * 4;
            ctx.beginPath(); ctx.moveTo(7, hly); ctx.lineTo(13, hly); ctx.stroke();
          }
        }

        /* 項目名（中区分よりインデント） */
        var nameX = 42;
        ctx.fillStyle = task.is_milestone ? '#7c3aed' : '#334155';
        ctx.textAlign = 'left';
        ctx.font = '10px "游ゴシック", "Yu Gothic", sans-serif';
        var nameLabel = task.name;
        var maxNameW = nameColW - nameX - 8;
        if (ctx.measureText(nameLabel).width > maxNameW) {
          while (nameLabel.length > 1 && ctx.measureText(nameLabel + '…').width > maxNameW) {
            nameLabel = nameLabel.substring(0, nameLabel.length - 1);
          }
          nameLabel += '…';
        }
        ctx.fillText(nameLabel, nameX, midY + 4);

        /* 担当者 */
        if (task.assigned) {
          ctx.fillStyle = '#64748b';
          ctx.font = '10px "游ゴシック", "Yu Gothic", sans-serif';
          var assignLabel = task.assigned;
          if (ctx.measureText(assignLabel).width > assignColW - 10) {
            while (assignLabel.length > 1 && ctx.measureText(assignLabel + '…').width > assignColW - 10) {
              assignLabel = assignLabel.substring(0, assignLabel.length - 1);
            }
            assignLabel += '…';
          }
          ctx.fillText(assignLabel, nameColW + 6, midY + 4);
        }

        /* ── 状態セル ── */
        var statusX = colBaseX;
        var statusColor = STATUS_COLORS[task.status] || '#9ca3af';
        /* 背景色（薄く） */
        ctx.fillStyle = statusColor + '22';
        ctx.fillRect(statusX + 1, ty + 1, statusColW - 2, rowHeight - 2);
        /* テキスト */
        ctx.fillStyle = statusColor;
        ctx.font = 'bold 9px "游ゴシック", "Yu Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(task.status, statusX + statusColW / 2, midY + 3);

        /* ── 遅延日セル（自動計算: 進捗と日程から算出） ── */
        var delayX = colBaseX + statusColW;
        var progVal = task.progress || 0;
        var tStart = parseDate(task.start);
        var tEnd = parseDate(task.end);
        var totalDays = Math.max(1, Math.round((tEnd - tStart) / 86400000));
        var elapsed = Math.round((today - tStart) / 86400000);
        var expectedProg = Math.max(0, Math.min(100, elapsed / totalDays * 100));
        var diffDays = Math.round((progVal - expectedProg) / 100 * totalDays);
        var delayLabel = '-';
        var delayColor = '#94a3b8';
        if (task.status === '完了') {
          delayLabel = '-'; delayColor = '#94a3b8';
        } else if (task.status === '未着手' && elapsed <= 0) {
          delayLabel = '-'; delayColor = '#94a3b8';
        } else if (diffDays < 0) {
          delayLabel = diffDays + '日';
          delayColor = '#ef4444';
          ctx.fillStyle = '#fef2f2';
          ctx.fillRect(delayX + 1, ty + 1, delayColW - 2, rowHeight - 2);
        } else if (diffDays > 0) {
          delayLabel = '+' + diffDays + '日';
          delayColor = '#10b981';
          ctx.fillStyle = '#f0fdf4';
          ctx.fillRect(delayX + 1, ty + 1, delayColW - 2, rowHeight - 2);
        }
        ctx.fillStyle = delayColor;
        ctx.font = 'bold 9px "游ゴシック", "Yu Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(delayLabel, delayX + delayColW / 2, midY + 3);

        /* ── 進捗%セル（数値のみ） ── */
        var progX = colBaseX + statusColW + delayColW;
        ctx.fillStyle = progVal >= 100 ? '#10b981' : progVal >= 50 ? '#3b82f6' : progVal > 0 ? '#f59e0b' : '#94a3b8';
        ctx.font = 'bold 9px "游ゴシック", "Yu Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(progVal + '%', progX + progColW / 2, midY + 3);

        /* 編集可能セル登録（管理職のみ） */
        if (PRIVILEGED && !task.is_milestone) {
          cellClickAreas.push({ task: task, field: 'status', x: statusX, y: ty, w: statusColW, h: rowHeight });
          cellClickAreas.push({ task: task, field: 'progress', x: progX, y: ty, w: progColW, h: rowHeight });
        }

        ctx.font = '10px "游ゴシック", "Yu Gothic", sans-serif';

        var taskStart = parseDate(task.start);
        var taskEnd = parseDate(task.end);

        /* ── マイルストーン（位置だけ記録、描画は後で） ── */
        if (task.is_milestone) {
          var msOffset = Math.floor((taskStart - rangeStart) / 86400000);
          if (msOffset >= 0 && msOffset < DISPLAY_DAYS) {
            var mlx = leftMargin + (msOffset + 0.5) * dayWidth;
            var lineColor = task.status === '完了' ? '#059669' : '#7c3aed';
            msLabels.push({ x: mlx, name: task.name, color: lineColor, date: fmtDate(taskStart) });
          }
          currentY += rowHeight; return;
        }

        /* 範囲チェック */
        if (taskEnd < rangeStart || taskStart > rangeEnd) { currentY += rowHeight; return; }

        var barStartDate = taskStart < rangeStart ? rangeStart : taskStart;
        var barEndDate = taskEnd > rangeEnd ? rangeEnd : taskEnd;
        var sOffset = Math.floor((barStartDate - rangeStart) / 86400000);
        var eOffset = Math.floor((barEndDate - rangeStart) / 86400000);
        var barX = leftMargin + sOffset * dayWidth + 1;
        var barW = (eOffset - sOffset + 1) * dayWidth - 2;
        var barH = rowHeight - 12;
        var barY = ty + 6;
        var barR = 5;

        barAreas.push({ task: task, barX: barX, barY: barY, barW: barW, barH: barH, dayWidth: dayWidth });

        /* 影 */
        ctx.shadowColor = 'rgba(0,0,0,0.12)'; ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 2;

        /* 予定バー */
        if (task.status === '停止') {
          ctx.fillStyle = barGradient(ctx, barX, barY, barH, '#e5e7eb', '#d1d5db');
        } else if (task.status === '完了') {
          ctx.fillStyle = barGradient(ctx, barX, barY, barH, '#6ee7b7', '#10b981');
        } else {
          ctx.fillStyle = barGradient(ctx, barX, barY, barH, '#bfdbfe', '#60a5fa');
        }
        roundRect(ctx, barX, barY, barW, barH, barR); ctx.fill();
        ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;

        /* 予定バー枠線 */
        if (task.status === '停止') { ctx.strokeStyle = '#9ca3af'; }
        else if (task.status === '完了') { ctx.strokeStyle = '#059669'; }
        else { ctx.strokeStyle = '#3b82f6'; }
        ctx.lineWidth = 0.8;
        roundRect(ctx, barX, barY, barW, barH, barR); ctx.stroke();

        /* 進捗バー */
        if (task.progress > 0 && task.status !== '停止' && task.status !== '完了') {
          var progW = barW * Math.min(task.progress, 100) / 100;
          if (progW > 3) {
            if (task.status === '遅れ') {
              ctx.fillStyle = barGradient(ctx, barX, barY, barH, '#fca5a5', '#ef4444');
              ctx.strokeStyle = '#dc2626';
            } else {
              ctx.fillStyle = barGradient(ctx, barX, barY, barH, '#6ee7b7', '#10b981');
              ctx.strokeStyle = '#059669';
            }
            roundRect(ctx, barX, barY, progW, barH, barR); ctx.fill();
            ctx.lineWidth = 0.5;
            roundRect(ctx, barX, barY, progW, barH, barR); ctx.stroke();
          }
        }

        /* ドラッグハンドル */
        if (PRIVILEGED && barW > 24) {
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          roundRect(ctx, barX + 1, barY + 2, 5, barH - 4, 2); ctx.fill();
          roundRect(ctx, barX + barW - 6, barY + 2, 5, barH - 4, 2); ctx.fill();
          ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.5;
          for (var hi = 0; hi < 3; hi++) {
            var hx = barX + 2; var hy = barY + barH / 2 - 3 + hi * 3;
            ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(hx + 2, hy); ctx.stroke();
            hx = barX + barW - 4;
            ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(hx + 2, hy); ctx.stroke();
          }
        }

        /* 進捗テキスト */
        if (barW > 35) {
          ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 2;
          ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 1;
          ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
          ctx.font = 'bold 9px "游ゴシック", "Yu Gothic", sans-serif';
          ctx.fillText(task.progress + '%', barX + barW / 2, barY + barH / 2 + 3);
          ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
          ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
        }
        ctx.font = '10px "游ゴシック", "Yu Gothic", sans-serif';

        currentY += rowHeight;
      });
      }); /* end subcatOrder.forEach */
    });

    /* milestone_only タスクをmsLabelsに追加 */
    milestoneOnlyTasks.forEach(function (t) {
      var ts = parseDate(t.start);
      var msOffset = Math.floor((ts - rangeStart) / 86400000);
      if (msOffset >= 0 && msOffset < DISPLAY_DAYS) {
        var mlx = leftMargin + (msOffset + 0.5) * dayWidth;
        var lc = t.status === '完了' ? '#059669' : '#7c3aed';
        msLabels.push({ x: mlx, name: t.name, color: lc, date: fmtDate(ts) });
      }
    });

    /* マイルストーン縦線（全タスク描画後に最前面で描画） */
    msLabels.forEach(function (ml) {
      ctx.strokeStyle = ml.color; ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 3]);
      ctx.beginPath(); ctx.moveTo(ml.x, headerHeight); ctx.lineTo(ml.x, totalHeight); ctx.stroke();
      ctx.setLineDash([]);
      /* ▼マーカー */
      ctx.fillStyle = ml.color; ctx.beginPath();
      ctx.moveTo(ml.x - 5, headerHeight); ctx.lineTo(ml.x + 5, headerHeight);
      ctx.lineTo(ml.x, headerHeight + 8); ctx.closePath(); ctx.fill();
    });

    /* マイルストーンラベル（イベント行に横書き） */
    if (eventRowHeight > 0 && msLabels.length > 0) {
      ctx.font = 'bold 10px "游ゴシック", "Yu Gothic", sans-serif';
      /* イベント行の左端にラベル */
      ctx.fillStyle = '#7c3aed'; ctx.textAlign = 'left';
      ctx.fillText('📅 イベント', 6, baseHeaderHeight + 16);
      /* 各ラベルをイベント行内に配置 */
      msLabels.forEach(function (ml, idx) {
        var label = ml.date + ' ' + ml.name;
        var tw = ctx.measureText(label).width;
        var lx = ml.x + 4;
        var ly = baseHeaderHeight + 4 + idx * 18;
        /* 背景 */
        ctx.fillStyle = 'rgba(255,255,255,0.92)';
        ctx.fillRect(lx - 2, ly, tw + 6, 16);
        ctx.strokeStyle = ml.color; ctx.lineWidth = 0.5;
        ctx.strokeRect(lx - 2, ly, tw + 6, 16);
        /* テキスト */
        ctx.fillStyle = ml.color; ctx.textAlign = 'left';
        ctx.font = 'bold 10px "游ゴシック", "Yu Gothic", sans-serif';
        ctx.fillText(label, lx, ly + 12);
      });
    }

    /* 今日の赤枠線（最前面） */
    if (todayColX >= 0) {
      ctx.strokeStyle = 'rgba(239,68,68,0.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([]);
      ctx.strokeRect(todayColX, 0, dayWidth, totalHeight);
      ctx.fillStyle = '#ef4444'; ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('TODAY', todayColX + dayWidth / 2, headerHeight + 10);
    }

    /* 縦の区切り罫線を最前面に再描画 */
    colDividers.forEach(function (cx) {
      ctx.strokeStyle = (cx === leftMargin) ? '#94a3b8' : '#cbd5e1';
      ctx.lineWidth = (cx === leftMargin) ? 1.5 : 1;
      ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, totalHeight); ctx.stroke();
    });

    /* ── ヘッダー固定Canvas: メインCanvasのヘッダー部分をコピー ── */
    var hCtx = headerCanvas.getContext('2d');
    headerCanvas.width = canvas.width;
    headerCanvas.height = headerHeight * dpr;
    headerCanvas.style.width = totalWidth + 'px';
    headerCanvas.style.height = headerHeight + 'px';
    hCtx.drawImage(canvas, 0, 0, canvas.width, headerHeight * dpr, 0, 0, canvas.width, headerHeight * dpr);

    /* メインCanvasをヘッダー分だけ上にずらして重複を隠す */
    canvas.style.marginTop = '-' + headerHeight + 'px';

    /* ヘッダーとボディは同一コンテナ内なので横スクロールは自動同期 */
  }

  function roundRect(ctx, x, y, w, h, r) {
    if (w < 0) w = 0;
    if (w < 2 * r) r = w / 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  drawGantt();
  window.addEventListener('resize', drawGantt);
})();
</script>
